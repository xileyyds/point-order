<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>点菜单 - 管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #f7f6f9;
      min-height: 100vh;
    }

    .topbar {
      background: #472060;
      padding: 36px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-title { font-size: 18px; font-weight: 700; color: white; }

    .login-box {
      max-width: 320px;
      margin: 80px auto;
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .login-box h2 { font-size: 20px; color: #472060; margin-bottom: 20px; text-align: center; }
    .login-box input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      border: 1.5px solid #e0d0ee; font-size: 15px; outline: none;
      margin-bottom: 12px; font-family: inherit;
    }
    .login-box input:focus { border-color: #7c5cbf; }
    .login-box button {
      width: 100%; padding: 12px; border-radius: 10px;
      background: #7c5cbf; color: white; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .login-box .error { color: #ff4d4f; font-size: 13px; margin-top: 8px; text-align: center; }

    .admin-content { display: none; }
    .admin-content.show { display: block; }

    .tab-bar {
      display: flex;
      background: white;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 72px;
      z-index: 40;
    }
    .tab-btn {
      flex: 1; padding: 14px; border: none; background: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      color: #888; border-bottom: 2px solid transparent;
      font-family: inherit;
    }
    .tab-btn.active { color: #7c5cbf; border-bottom-color: #7c5cbf; }

    .tab-panel { display: none; padding: 16px; }
    .tab-panel.active { display: block; }

    /* 订单 */
    .order-item {
      background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .order-id { font-size: 12px; color: #bbb; }
    .order-status { font-size: 12px; padding: 3px 10px; border-radius: 20px; }
    .order-status.new { background: #fff0f0; color: #ff4d4f; }
    .order-status.done { background: #f0fff0; color: #52c41a; }
    .order-items { font-size: 14px; color: #333; line-height: 1.6; }
    .order-time { font-size: 11px; color: #bbb; margin-top: 6px; }
    .order-note { font-size: 12px; color: #888; margin-top: 4px; font-style: italic; }
    .order-done-btn {
      margin-top: 8px; padding: 6px 16px; border-radius: 16px;
      background: #f0f0f0; color: #666; border: none;
      font-size: 12px; cursor: pointer; font-family: inherit;
    }
    .no-order { text-align: center; padding: 40px; color: #bbb; font-size: 14px; }
    .refresh-btn {
      padding: 8px 16px; border-radius: 16px;
      background: #f0eef3; color: #7c5cbf; border: none;
      font-size: 12px; cursor: pointer; font-family: inherit;
      margin-bottom: 12px;
    }

    /* 菜单编辑 */
    .cat-section { background: white; border-radius: 14px; margin-bottom: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .cat-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 12px; border-bottom: 1px solid #f0eef3; }
    .cat-title { font-size: 15px; font-weight: 700; color: #472060; }
    .cat-del {
      background: none; border: none; color: #ff4d4f; font-size: 18px;
      cursor: pointer; padding: 4px 8px;
    }
    .menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-bottom: 1px solid #f8f7fa;
    }
    .menu-item:last-of-type { border-bottom: none; }
    .item-name { flex: 1; font-size: 14px; color: #333; }
    .item-del {
      background: none; border: none; color: #ff4d4f; font-size: 18px;
      cursor: pointer; padding: 4px 8px; flex-shrink: 0;
    }
    .add-item-row {
      display: flex; gap: 8px; padding: 12px 16px;
      border-top: 1px solid #f0eef3; background: #fafaff;
    }
    .add-item-input {
      flex: 1; padding: 8px 12px; border-radius: 8px;
      border: 1.5px solid #e0d0ee; font-size: 13px; outline: none;
      font-family: inherit;
    }
    .add-item-input:focus { border-color: #7c5cbf; }
    .add-item-confirm {
      padding: 8px 14px; border-radius: 8px;
      background: #7c5cbf; color: white; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
      flex-shrink: 0;
    }
    .cat-add-row {
      padding: 12px 16px;
      border-top: 1px dashed #d0c0e0;
    }
    .add-cat-btn {
      width: 100%; padding: 10px; border-radius: 10px;
      border: 1.5px dashed #d0c0e0; background: none;
      color: #7c5cbf; font-size: 13px; cursor: pointer;
      font-family: inherit;
    }

    .save-btn {
      width: 100%; padding: 14px; border-radius: 24px; border: none;
      background: #7c5cbf; color: white; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit; margin-top: 16px;
    }
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,20,50,0.85); color: white;
      padding: 10px 24px; border-radius: 50px;
      font-size: 14px; z-index: 999;
      opacity: 0; pointer-events: none;
      transition: all 0.3s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 设置 */
    .setting-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #f0eef3; }
    .setting-label { font-size: 14px; color: #666; width: 60px; flex-shrink: 0; }
    .setting-input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1.5px solid #e0d0ee; font-size: 14px; outline: none; font-family: inherit; }
    .setting-input:focus { border-color: #7c5cbf; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-title">🍡 点菜单管理后台</div>
  </div>

  <!-- 登录 -->
  <div class="login-box" id="loginBox">
    <h2>管理后台</h2>
    <input type="password" id="pwInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登录</button>
    <div class="error" id="loginError" style="display:none"></div>
  </div>

  <!-- 管理内容 -->
  <div class="admin-content" id="adminContent">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('orders')">📋 订单</button>
      <button class="tab-btn" onclick="switchTab('menu')">🍽️ 菜单</button>
      <button class="tab-btn" onclick="switchTab('settings')">⚙️ 设置</button>
    </div>

    <!-- 订单 -->
    <div class="tab-panel active" id="panel-orders">
      <button class="refresh-btn" onclick="loadOrders()">🔄 刷新订单</button>
      <div id="ordersList"></div>
    </div>

    <!-- 菜单 -->
    <div class="tab-panel" id="panel-menu">
      <div id="menuEditor"></div>
      <div class="cat-add-row">
        <button class="add-cat-btn" onclick="doAddCategory()">➕ 新增分类</button>
      </div>
      <button class="save-btn" onclick="doSaveMenu()">💾 保存全部修改</button>
    </div>

    <!-- 设置 -->
    <div class="tab-panel" id="panel-settings">
      <div class="setting-row">
        <div class="setting-label">标题</div>
        <input class="setting-input" id="cfgTitle" placeholder="点菜单标题">
      </div>
      <div class="setting-row">
        <div class="setting-label">称呼</div>
        <input class="setting-input" id="cfgOwner" placeholder="比如：宝贝">
      </div>
      <div class="setting-row">
        <div class="setting-label">等级</div>
        <input class="setting-input" id="cfgLevel" placeholder="Lv.0">
      </div>
      <button class="save-btn" onclick="doSaveSettings()">💾 保存设置</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? '/api'
      : 'https://point-order.vercel.app/api';

    let gPassword = '';
    let gConfig = null;
    let gOrders = [];

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function doLogin() {
      const pw = document.getElementById('pwInput').value;
      if (!pw) return;
      document.getElementById('loginError').style.display = 'none';
      gPassword = pw;
      sessionStorage.setItem('admin_pw', pw);
      loadConfig();
    }

    function tryAutoLogin() {
      const savedPw = sessionStorage.getItem('admin_pw');
      if (savedPw) {
        gPassword = savedPw;
        document.getElementById('pwInput').value = savedPw;
        loadConfig();
      }
    }

    async function loadConfig() {
      try {
        const r = await fetch(`${API}/config?password=${encodeURIComponent(gPassword)}`);
        if (r.status === 401) {
          document.getElementById('loginError').textContent = '密码错误';
          document.getElementById('loginError').style.display = 'block';
          return;
        }
        gConfig = await r.json();
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminContent').classList.add('show');
        document.getElementById('cfgTitle').value = gConfig.title || '';
        document.getElementById('cfgOwner').value = gConfig.owner || '';
        document.getElementById('cfgLevel').value = gConfig.level || 'Lv.0';
        renderMenu();
        loadOrders();
      } catch (e) {
        document.getElementById('loginError').textContent = '加载失败：' + e.message;
        document.getElementById('loginError').style.display = 'block';
      }
    }

    async function loadOrders() {
      try {
        const r = await fetch(`${API}/order`);
        const data = await r.json();
        gOrders = data.orders || [];
        renderOrders();
      } catch (e) {
        document.getElementById('ordersList').innerHTML = `<div class="no-order">加载失败：${e.message}</div>`;
      }
    }

    function renderOrders() {
      const el = document.getElementById('ordersList');
      const newOrders = gOrders.filter(o => o.status !== 'done');
      if (newOrders.length === 0) {
        el.innerHTML = '<div class="no-order">暂无新订单</div>';
        return;
      }
      el.innerHTML = newOrders.map(o => `
        <div class="order-item">
          <div class="order-header">
            <span class="order-id">订单 #${o.id}</span>
            <span class="order-status new">新订单</span>
          </div>
          <div class="order-items">${o.items.map(i => `${i.emoji || ''} ${i.name}${i.count > 1 ? ' x'+i.count : ''}`).join('、')}</div>
          <div class="order-time">${new Date(o.time).toLocaleString('zh-CN')}</div>
          ${o.note ? `<div class="order-note">备注：${o.note}</div>` : ''}
          <button class="order-done-btn" onclick="markDone(${o.id})">✓ 标记已处理</button>
        </div>
      `).join('');
    }

    async function markDone(id) {
      await fetch(`${API}/order`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status: 'done', password: gPassword })
      });
      loadOrders();
      showToast('订单已处理 ✓');
    }

    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', ['orders','menu','settings'][i] === name);
      });
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
    }

    // ========== 菜单渲染 ==========
    // 每个item用 data-full-idx 存储在 gConfig.items 中的真实索引
    function renderMenu() {
      const el = document.getElementById('menuEditor');
      if (!gConfig) return;
      el.innerHTML = gConfig.cats.map((cat, catIdx) => `
        <div class="cat-section" data-cat-idx="${catIdx}">
          <div class="cat-header">
            <div class="cat-title">${cat}</div>
            <button class="cat-del" onclick="doDeleteCat(${catIdx})" title="删除分类">×</button>
          </div>
          <div class="cat-items">
            ${gConfig.items
              .map((item, fullIdx) => ({ item, fullIdx }))
              .filter(({ item }) => item.cat === catIdx)
              .map(({ item, fullIdx }) => `
                <div class="menu-item" data-full-idx="${fullIdx}">
                  <div style="width:40px;height:40px;border-radius:8px;background:#f5f0fa;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;">
                    ${item.img ? `<img src="${item.img}" style="width:100%;height:100%;object-fit:cover;">` : `<span style="font-size:20px;">${getIconEmoji(item.icon)}</span>`}
                  </div>
                  <input class="item-name-input" value="${item.name}" onchange="doRenameItem(${fullIdx}, this.value)" style="flex:1;padding:6px 8px;border-radius:6px;border:1.5px solid #e0d0ee;font-size:13px;outline:none;font-family:inherit;" placeholder="商品名称">
                  <input class="item-img-input" value="${item.img || ''}" onchange="doSetImg(${fullIdx}, this.value)" style="width:80px;padding:6px 8px;border-radius:6px;border:1.5px solid #e0d0ee;font-size:11px;outline:none;font-family:inherit;" placeholder="图片URL">
                  <button class="item-del" onclick="doDeleteItem(${fullIdx})" title="删除">×</button>
                </div>
              `).join('')
            }
          </div>
          <div class="add-item-row">
            <input class="add-item-input" id="add-item-input-${catIdx}" placeholder="输入商品名称，按回车添加" onkeydown="if(event.key==='Enter')doAddItem(${catIdx})">
            <button class="add-item-confirm" onclick="doAddItem(${catIdx})">添加</button>
          </div>
        </div>
      `).join('');
    }

    function getIconEmoji(icon) {
      const map = { milkTea:'🧋', coffee:'☕', drink:'🥤', hotpot:'🍲', bbq:'🍖', chicken:'🍗', heart:'❤️', star:'⭐', hand:'🤏', question:'❓', default:'📦' };
      return map[icon] || '📦';
    }

    function doRenameItem(fullIdx, newName) {
      if (gConfig.items[fullIdx]) {
        gConfig.items[fullIdx].name = newName;
      }
    }

    function doSetImg(fullIdx, imgUrl) {
      if (gConfig.items[fullIdx]) {
        gConfig.items[fullIdx].img = imgUrl.trim() || null;
      }
    }

    // 添加商品（通过输入框，不用 prompt）
    function doAddItem(catIdx) {
      const input = document.getElementById('add-item-input-' + catIdx);
      const name = input.value.trim();
      if (!name) return;
      gConfig.items.push({ cat: catIdx, name, icon: 'default', sales: '' });
      input.value = '';
      renderMenu();
      showToast('已添加：' + name);
    }

    // 删除商品（用真实索引）
    function doDeleteItem(fullIdx) {
      const name = gConfig.items[fullIdx] ? gConfig.items[fullIdx].name : '(未知)';
      gConfig.items.splice(fullIdx, 1);
      renderMenu();
      showToast('已删除：' + name);
    }

    // 添加分类
    function doAddCategory() {
      const name = prompt('请输入新分类名称：');
      if (!name || !name.trim()) return;
      gConfig.cats.push(name.trim());
      renderMenu();
      showToast('已添加分类：' + name.trim());
    }

    // 删除分类（同时删除该分类下的所有商品）
    function doDeleteCat(catIdx) {
      const catName = gConfig.cats[catIdx];
      if (!confirm('确定删除分类「' + catName + '」吗？该分类下的商品也会被删除。')) return;
      gConfig.items = gConfig.items.filter(i => i.cat !== catIdx);
      // 重新排索引：比被删分类索引大的，索引减1
      gConfig.items.forEach(item => { if (item.cat > catIdx) item.cat--; });
      gConfig.cats.splice(catIdx, 1);
      renderMenu();
      showToast('已删除分类：' + catName);
    }

    // 保存菜单
    async function doSaveMenu() {
      try {
        const r = await fetch(`${API}/config`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: gPassword, items: gConfig.items, cats: gConfig.cats })
        });
        if (r.ok) {
          showToast('菜单保存成功！');
        } else {
          const j = await r.json();
          showToast('保存失败：' + (j.error || '未知错误'));
        }
      } catch (e) {
        showToast('保存失败：' + e.message);
      }
    }

    // 保存设置
    async function doSaveSettings() {
      try {
        const updates = {
          title: document.getElementById('cfgTitle').value.trim(),
          owner: document.getElementById('cfgOwner').value.trim(),
          level: document.getElementById('cfgLevel').value.trim(),
        };
        const r = await fetch(`${API}/config`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: gPassword, ...updates })
        });
        if (r.ok) {
          // 重新加载配置以获取最新值
          const r2 = await fetch(`${API}/config?password=${encodeURIComponent(gPassword)}`);
          if (r2.ok) {
            gConfig = await r2.json();
            document.getElementById('cfgTitle').value = gConfig.title || '';
            document.getElementById('cfgOwner').value = gConfig.owner || '';
            document.getElementById('cfgLevel').value = gConfig.level || '';
          }
          showToast('设置保存成功！');
        } else {
          const j = await r.json();
          showToast('保存失败：' + (j.error || '未知错误'));
        }
      } catch (e) {
        showToast('保存失败：' + e.message);
      }
    }

    // 定时刷新订单
    setInterval(() => {
      if (gConfig) loadOrders();
    }, 15000);

    // 页面加载时尝试自动登录
    tryAutoLogin();
  </script>
</body>
</html>
