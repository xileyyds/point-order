<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>点菜单 - 管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #f7f6f9;
      min-height: 100vh;
    }

    .topbar {
      background: #472060;
      padding: 36px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-title {
      font-size: 18px;
      font-weight: 700;
      color: white;
    }

    .login-box {
      max-width: 320px;
      margin: 80px auto;
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .login-box h2 { font-size: 20px; color: #472060; margin-bottom: 20px; text-align: center; }
    .login-box input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      border: 1.5px solid #e0d0ee; font-size: 15px; outline: none;
      margin-bottom: 12px; font-family: inherit;
    }
    .login-box input:focus { border-color: #7c5cbf; }
    .login-box button {
      width: 100%; padding: 12px; border-radius: 10px;
      background: #7c5cbf; color: white; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .login-box .error { color: #ff4d4f; font-size: 13px; margin-top: 8px; text-align: center; }

    .admin-content { display: none; }
    .admin-content.show { display: block; }

    .tab-bar {
      display: flex;
      background: white;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 72px;
      z-index: 40;
    }
    .tab-btn {
      flex: 1; padding: 14px; border: none; background: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      color: #888; border-bottom: 2px solid transparent;
      font-family: inherit;
    }
    .tab-btn.active { color: #7c5cbf; border-bottom-color: #7c5cbf; }

    .tab-panel { display: none; padding: 16px; }
    .tab-panel.active { display: block; }

    /* 设置面板 */
    .setting-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid #f0eef3;
    }
    .setting-label { font-size: 14px; color: #666; width: 70px; flex-shrink: 0; }
    .setting-input {
      flex: 1; padding: 8px 12px; border-radius: 8px;
      border: 1.5px solid #e0d0ee; font-size: 14px; outline: none;
      font-family: inherit;
    }
    .setting-input:focus { border-color: #7c5cbf; }
    .save-btn {
      padding: 10px 24px; border-radius: 20px;
      background: #7c5cbf; color: white; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
      margin-top: 16px;
    }

    /* 订单面板 */
    .order-item {
      background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .order-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .order-id { font-size: 12px; color: #bbb; }
    .order-status { font-size: 12px; padding: 3px 10px; border-radius: 20px; }
    .order-status.new { background: #fff0f0; color: #ff4d4f; }
    .order-status.done { background: #f0fff0; color: #52c41a; }
    .order-items { font-size: 14px; color: #333; line-height: 1.6; }
    .order-time { font-size: 11px; color: #bbb; margin-top: 6px; }
    .order-note { font-size: 12px; color: #888; margin-top: 4px; font-style: italic; }
    .order-done-btn {
      margin-top: 8px; padding: 6px 16px; border-radius: 16px;
      background: #f0f0f0; color: #666; border: none;
      font-size: 12px; cursor: pointer; font-family: inherit;
    }
    .no-order { text-align: center; padding: 40px; color: #bbb; font-size: 14px; }
    .refresh-btn {
      padding: 8px 16px; border-radius: 16px;
      background: #f0eef3; color: #7c5cbf; border: none;
      font-size: 12px; cursor: pointer; font-family: inherit;
      margin-bottom: 12px;
    }

    /* 菜单编辑 */
    .cat-section { margin-bottom: 20px; }
    .cat-title {
      font-size: 14px; font-weight: 700; color: #472060;
      padding: 10px 0 8px; border-bottom: 2px solid #f0eef3;
      margin-bottom: 8px;
    }
    .menu-item-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid #f8f7fa;
    }
    .menu-item-icon { font-size: 20px; width: 30px; text-align: center; flex-shrink: 0; }
    .menu-item-name { flex: 1; font-size: 14px; color: #333; }
    .menu-item-del {
      color: #ff4d4f; background: none; border: none;
      font-size: 18px; cursor: pointer; padding: 4px 8px;
    }
    .add-item-btn {
      width: 100%; padding: 10px; border-radius: 10px;
      border: 1.5px dashed #d0c0e0; background: none;
      color: #7c5cbf; font-size: 13px; cursor: pointer;
      font-family: inherit; margin-top: 4px;
    }
    .add-cat-btn {
      padding: 8px 16px; border-radius: 16px;
      background: #f0eef3; color: #7c5cbf; border: none;
      font-size: 12px; cursor: pointer; font-family: inherit;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <!-- 顶栏 -->
  <div class="topbar">
    <div class="topbar-title">🍡 点菜单管理后台</div>
  </div>

  <!-- 登录框 -->
  <div class="login-box" id="loginBox">
    <h2>管理后台</h2>
    <input type="password" id="pwInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登录</button>
    <div class="error" id="loginError" style="display:none"></div>
  </div>

  <!-- 管理内容 -->
  <div class="admin-content" id="adminContent">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('orders')">📋 订单</button>
      <button class="tab-btn" onclick="switchTab('menu')">🍽️ 菜单</button>
      <button class="tab-btn" onclick="switchTab('settings')">⚙️ 设置</button>
    </div>

    <!-- 订单面板 -->
    <div class="tab-panel active" id="panel-orders">
      <button class="refresh-btn" onclick="loadOrders()">🔄 刷新订单</button>
      <div id="ordersList"></div>
    </div>

    <!-- 菜单面板 -->
    <div class="tab-panel" id="panel-menu">
      <button class="add-cat-btn" onclick="addCategory()">+ 新增分类</button>
      <div id="menuEditor"></div>
      <button class="save-btn" onclick="saveMenu()">保存菜单</button>
    </div>

    <!-- 设置面板 -->
    <div class="tab-panel" id="panel-settings">
      <div class="setting-row">
        <div class="setting-label">标题</div>
        <input class="setting-input" id="cfgTitle" placeholder="点菜单标题">
      </div>
      <div class="setting-row">
        <div class="setting-label">称呼</div>
        <input class="setting-input" id="cfgOwner" placeholder="比如：宝贝">
      </div>
      <div class="setting-row">
        <div class="setting-label">等级</div>
        <input class="setting-input" id="cfgLevel" placeholder="Lv.0">
      </div>
      <button class="save-btn" onclick="saveSettings()">保存设置</button>
    </div>
  </div>

  <script>
    const API = 'https://point-order.vercel.app/api';
    let gPassword = '';
    let gConfig = null;
    let gOrders = [];

    function doLogin() {
      const pw = document.getElementById('pwInput').value;
      if (!pw) return;
      gPassword = pw;
      loadConfig();
    }

    async function loadConfig() {
      try {
        const r = await fetch(`${API}/config?password=${encodeURIComponent(gPassword)}`);
        if (r.status === 401) {
          document.getElementById('loginError').textContent = '密码错误';
          document.getElementById('loginError').style.display = 'block';
          return;
        }
        gConfig = await r.json();
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminContent').classList.add('show');
        renderMenuEditor();
        document.getElementById('cfgTitle').value = gConfig.title || '';
        document.getElementById('cfgOwner').value = gConfig.owner || '';
        document.getElementById('cfgLevel').value = gConfig.level || 'Lv.0';
        loadOrders();
      } catch (e) {
        document.getElementById('loginError').textContent = '加载失败：' + e.message;
        document.getElementById('loginError').style.display = 'block';
      }
    }

    async function loadOrders() {
      try {
        const r = await fetch(`${API}/order`);
        const data = await r.json();
        gOrders = data.orders || [];
        renderOrders();
      } catch (e) {
        document.getElementById('ordersList').innerHTML = `<div class="no-order">加载失败：${e.message}</div>`;
      }
    }

    function renderOrders() {
      const el = document.getElementById('ordersList');
      const newOrders = gOrders.filter(o => o.status !== 'done');
      if (newOrders.length === 0) {
        el.innerHTML = '<div class="no-order">暂无新订单</div>';
        return;
      }
      el.innerHTML = newOrders.map(o => `
        <div class="order-item">
          <div class="order-header">
            <span class="order-id">订单 #${o.id}</span>
            <span class="order-status ${o.status}">${o.status === 'done' ? '已处理' : '新订单'}</span>
          </div>
          <div class="order-items">${o.items.map(i => `${i.emoji || ''} ${i.name}${i.count > 1 ? ' x'+i.count : ''}`).join('、')}</div>
          <div class="order-time">${new Date(o.time).toLocaleString('zh-CN')}</div>
          ${o.note ? `<div class="order-note">备注：${o.note}</div>` : ''}
          ${o.status !== 'done' ? `<button class="order-done-btn" onclick="markDone(${o.id})">✓ 标记已处理</button>` : ''}
        </div>
      `).join('');
    }

    async function markDone(id) {
      await fetch(`${API}/order`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status: 'done', password: gPassword })
      });
      loadOrders();
    }

    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', ['orders','menu','settings'][i] === name);
      });
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
    }

    function renderMenuEditor() {
      const el = document.getElementById('menuEditor');
      el.innerHTML = gConfig.cats.map((cat, catIdx) => {
        const items = gConfig.items.filter(i => i.cat === catIdx);
        return `
          <div class="cat-section">
            <div class="cat-title">${cat}</div>
            ${items.map((item, itemIdx) => `
              <div class="menu-item-row">
                <span class="menu-item-icon">${getIconEmoji(item.icon)}</span>
                <span class="menu-item-name">${item.name}</span>
                <button class="menu-item-del" onclick="delItem(${catIdx}, ${itemIdx})">×</button>
              </div>
            `).join('')}
            <button class="add-item-btn" onclick="addItem(${catIdx})">+ 添加商品</button>
          </div>
        `;
      }).join('');
    }

    function getIconEmoji(icon) {
      const map = { milkTea:'🧋', coffee:'☕', drink:'🥤', hotpot:'🍲', bbq:'🍖', chicken:'🍗', heart:'❤️', star:'⭐', hand:'🤏', question:'❓', default:'📦' };
      return map[icon] || '📦';
    }

    function addItem(catIdx) {
      const name = prompt('商品名称：');
      if (!name) return;
      gConfig.items.push({ cat: catIdx, name, icon: 'default', sales: '' });
      renderMenuEditor();
    }

    function delItem(catIdx, itemIdx) {
      const fullIdx = gConfig.items.findIndex(i => i.cat === catIdx);
      // 找到对应分类下的第几个
      let count = 0;
      for (let i = 0; i < gConfig.items.length; i++) {
        if (gConfig.items[i].cat === catIdx) {
          if (count === itemIdx) { gConfig.items.splice(i, 1); break; }
          count++;
        }
      }
      renderMenuEditor();
    }

    function addCategory() {
      const name = prompt('分类名称：');
      if (!name) return;
      gConfig.cats.push(name);
      renderMenuEditor();
    }

    async function saveMenu() {
      try {
        const r = await fetch(`${API}/config`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: gPassword, items: gConfig.items, cats: gConfig.cats })
        });
        if (r.status === 200) alert('菜单保存成功！');
      } catch (e) { alert('保存失败：' + e.message); }
    }

    async function saveSettings() {
      try {
        const updates = {
          title: document.getElementById('cfgTitle').value,
          owner: document.getElementById('cfgOwner').value,
          level: document.getElementById('cfgLevel').value,
        };
        const r = await fetch(`${API}/config`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: gPassword, ...updates })
        });
        if (r.status === 200) alert('设置保存成功！');
      } catch (e) { alert('保存失败：' + e.message); }
    }

    // 定时刷新订单
    setInterval(() => {
      if (gConfig) loadOrders();
    }, 10000);
  </script>
</body>
</html>
